# =====================================================================
# Phylotree Excel 转 JSON — 配置文件
# 所有相对路径均相对于 project.base_dir
# =====================================================================

project:
  base_dir: "/mnt/f/OneDrive/文档（科研）/脚本/Download/10-mtDNA/13-phylotree-update/1-excel→json"  # 项目根目录
  name: "phylotree_excel_to_json"  # 流程名称

# --------------------------------------------------------------------- #
# 目录与文件：集中声明输入、模板、输出、临时目录和日志目录
# --------------------------------------------------------------------- #
paths:
  input_excel: "input/线粒体DNA系统发育树.xlsx"  # 输入 Excel 文件
  template_json: "template/phylotree_index_withacc.json"  # 结构模板 JSON
  output_json: "output/phylotree_build_17.3.json"  # 最终输出 JSON
  python_dir: "python"  # Python 模块目录
  helper_dir: "script"  # Shell 辅助脚本目录
  output_dir: "output"  # 输出目录
  temp_dir: "temp"  # 临时目录
  log_dir: "log"  # 日志目录

# --------------------------------------------------------------------- #
# 工具路径：统一管理 conda 与 Python 环境
# --------------------------------------------------------------------- #
tools:
  conda_bin: "/home/luolintao/miniconda3/condabin/conda"  # conda 可执行文件
  conda_env_name: "BigLin"  # 运行本流程的 conda 环境名
  python_module: "python/1-1-excel_to_phylotree_json.py"  # Excel 转 JSON 模块

# --------------------------------------------------------------------- #
# 运行参数：Excel sheet 与输出格式控制
# --------------------------------------------------------------------- #
runtime:
  phylotree_sheet: "Phylotree build 18"  # 系统发育树所在 sheet
  correction_sheet: "17→18部分节点校正"  # 可选：旧节点名到 build 18 节点名校正表
  indent: 2  # JSON 缩进空格数
  overwrite: true  # 是否允许覆盖已存在的输出 JSON
